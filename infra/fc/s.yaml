# Serverless Devs (s.yaml) — Foreshadow on Alibaba Function Compute 3.0.
#
# MANAGED python3.10 runtime (no container / no ACR / no real-name verification).
# Foreshadow targets 3.12; infra/fc/wsgi.py shims enum.StrEnum before importing
# the package, so the app runs unchanged on the 3.10 managed runtime.
#
#   s build --use-docker   # installs requirements.txt into .s/build/.../python
#   s deploy               # zips code + deps, creates the fn + HTTP trigger
#
# Endpoints (anonymous HTTP trigger):
#   GET /verify   re-verify the committed forklift replay (Ed25519 + Merkle + I1-I4)
#   GET /run      run one deterministic offline pipeline replay
#   GET /health   liveness

edition: 3.0.0
name: foreshadow-fc
access: default

vars:
  region: ap-southeast-1

resources:
  foreshadow:
    component: fc3
    props:
      region: ${vars.region}
      functionName: foreshadow
      description: "Foreshadow — incident report -> provenance-signed safety film (Qwen Cloud)"
      runtime: python3.10
      handler: infra.fc.wsgi.handler
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 5
      # code root = the build dir (this file lives in infra/fc/).
      code: ../../
      environmentVariables:
        # s build installs requirements.txt deps under /code/python
        PYTHONPATH: /code/python
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
